<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="爆杯雷霆">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6B4226">
    <title>爆杯雷霆 - 校园饮品管理</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 应用容器 -->
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon-wrapper">
                        <img src="assets/mascot.png" alt="看板娘" class="logo-mascot">
                    </div>
                    <div class="logo-text-group">
                        <span class="logo-text">爆杯雷霆</span>
                        <span class="logo-subtitle">校园饮品</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="notificationBtn" title="消息通知">
                        <i class="fas fa-bell"></i>
                        <span class="badge" style="display:none;">0</span>
                    </button>
                    <button class="icon-btn profile-btn" id="profileBtn" title="个人中心">
                        <img src="assets/avatar.jpg" alt="头像" class="avatar-small" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                        <i class="fas fa-user-circle avatar-fallback" style="display:none;"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="main-content" id="mainContent">
            <!-- 页面将通过JS动态渲染 -->
        </main>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="dashboard">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </button>
            <button class="nav-item" data-page="collection">
                <i class="fas fa-book-open"></i>
                <span>图鉴</span>
            </button>
            <button class="nav-item" data-page="records">
                <i class="fas fa-mug-hot"></i>
                <span>记录</span>
            </button>
            <button class="nav-item" data-page="leaderboard">
                <i class="fas fa-trophy"></i>
                <span>排行</span>
            </button>
            <button class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span>档案</span>
            </button>
        </nav>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <!-- 用户切换弹窗 -->
    <div class="modal-overlay" id="userSwitchModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-users"></i> 切换用户</h3>
                <button class="modal-close" id="closeUserModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <!-- 用户列表 -->
                <div class="user-list" id="userList">
                    <!-- 动态渲染 -->
                </div>
                <!-- 创建新用户 -->
                <div class="create-user-section">
                    <h4 class="create-user-title">创建新同学</h4>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="newUserName" class="form-input" placeholder="输入姓名...">
                    </div>
                    <div class="form-group">
                        <label>班级</label>
                        <input type="text" id="newUserClass" class="form-input" placeholder="如：高三(1)班">
                    </div>
                    <button class="btn btn-primary btn-block" id="createUserBtn">
                        <i class="fas fa-user-plus"></i> 创建并切换
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加饮品弹窗 -->
    <div class="modal-overlay" id="addDrinkModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加饮品记录</h3>
                <button class="modal-close" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>饮品名称</label>
                    <select id="drinkName" class="form-select">
                        <option value="">选择饮品...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>饮品分类</label>
                    <select id="drinkCategory" class="form-select">
                        <option value="coffee">咖啡</option>
                        <option value="tea">茶饮</option>
                        <option value="milk_tea">奶茶</option>
                        <option value="juice">果汁</option>
                        <option value="soda">汽水</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>容量</label>
                    <div class="size-selector">
                        <button class="size-btn" data-size="small">小杯</button>
                        <button class="size-btn active" data-size="medium">中杯</button>
                        <button class="size-btn" data-size="large">大杯</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>价格 (¥)</label>
                    <input type="number" id="drinkPrice" class="form-input" placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label>评分</label>
                    <div class="rating-selector" id="ratingSelector">
                        <i class="far fa-star" data-rating="1"></i>
                        <i class="far fa-star" data-rating="2"></i>
                        <i class="far fa-star" data-rating="3"></i>
                        <i class="far fa-star" data-rating="4"></i>
                        <i class="far fa-star" data-rating="5"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="drinkNote" class="form-textarea" placeholder="添加一些备注..." rows="2"></textarea>
                </div>
                <button class="btn btn-primary btn-block" id="saveDrinkBtn">
                    <i class="fas fa-plus-circle"></i> 添加记录
                </button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/ai-recommend.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/records.js"></script>
    <script src="js/pages/collection.js"></script>
    <script src="js/pages/profile.js"></script>
    <script src="js/pages/leaderboard.js"></script>
    <script src="js/pages/community.js"></script>
</body>
</html>
